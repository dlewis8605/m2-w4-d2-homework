<!DOCTYPE html>
<html lang="en">
<head>
    <title>Food Blog</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.12/dist/vue.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&display=swap" rel="stylesheet">
    <style>
        * {
            font-family:Arial, Helvetica, sans-serif;
        }
        body {
            margin: 0;
        }
        #leftside {
            position: fixed;
            left: 0;
            top: 0;
            width: 30%;
            height: 100vh;
            background-color:rgb(77, 192, 154);
            z-index: -1;
        }
        #rightside {
            position: fixed;
            right: 0;
            top: 0;
            width: 70%;
            height: 100vh;
            background-color:rgb(238, 226, 192);
            z-index: -1;
        }
        #container {
            background-color:rgba(255, 255, 255, 0.85);
            position: absolute;
            top: 15%;
            left: 15%;
            min-width: 1100px;
            min-height: 1050px;
            border-radius: 0.7em;
        }
        header {
            height: 50px;
            background-color:rgba(231, 229, 229, 0.5);
            font-size: 2.75em;
            padding:0.5em;
            color:rgb(216, 150, 7);
        }
        header span {
            font-family: 'Sacramento', cursive;
        }
        main {
            position: relative;
        }
        main h2 {
            position: absolute;
            left: 20%;
            top: 30px;
            margin: 25px 0 200px 50px;
            color:rgb(60, 190, 160);
            text-transform: uppercase;
        }
        main #photos img {
            margin: 0.75em;
            border: 0.85em solid rgb(255, 255, 255);
        }
        section#blogposts {
            position: absolute;
            left: 20%;
            top: 70px;
            padding: 50px;
        }
        main .post {
            margin: 25px;
            padding: 25px;
            border: 2px solid rgba(83, 78, 58, 0.6);
            border-radius: 0.5em;
        }
        footer {
            position: absolute;
            bottom: 0;
            height: 50px;
            width: 100%;
            text-align: center;
            font-size: 0.85em;
        }
        #profile-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: black;
            color: white;
            padding: 20px 20px 50px 20px;
            border: 2px solid rgb(60, 190, 160);
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 1000;
            width: 300px;
            text-align: center;
        }
        #profile-modal h3 {
            margin-top: 0;
            color: white;
        }
        #profile-modal .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: none;
            font-size: 1.2em;
            color: white;
        }
        #profile-modal .bottom-close-btn {
            position: absolute;
            bottom: 10px;
            left: 10px;
            cursor: pointer;
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .profile-pic {
            cursor: pointer;
            border-radius: 50%;
            float: left;
            margin-right: 15px;
            width: 50px;
            height: 50px;
        }
    </style>

    

</head>
<body>
    <aside id="leftside"></aside>
    <aside id="rightside"></aside>
    <div id="container">
    <header><span>Food Blog</span></header>

    <main>
    
    <aside id="photos">
        <img src="images/chili.jpg" alt="White Chicken Chili" width="180">
    </aside>
    <h2>Comments</h2>
    
    
    <section id="blogposts">
        <blog-post v-for="(post, key) in posts" :key="key" :post="post" @show-profile="displayProfile"></blog-post>
        
        <div id="profile-modal" v-if="activePost">
            <button class="close-btn" @click="activePost = null">&times;</button>
            <h3>{{ activePost.author }}</h3>
            <p><strong>Foodie Level:</strong> {{ activePost.level }}</p>
            <p><strong>Bio:</strong> {{ activePost.bio }}</p>
            <button class="bottom-close-btn" @click="activePost = null">Close</button>
        </div>
    </section>

    </main>

    <footer>
        &copy; Copyright FOOD BLOG
    </footer>
    
</div>

    <script>
        Vue.component('blog-post', {
            props: ['post'],
            template: `
            <div class="post">
                <img :src="post.profilePic" class="profile-pic" alt="Profile" @click="$emit('show-profile', post)">
                <span class="author">{{ post.author }}</span> — 
                <span class="date">{{ post.date }}</span>
                <span class="reply">REPLY</span>
                <p>
                {{ post.text }}
                </p>
                <div style="clear:both;"></div>
            </div>
            `
        });

        new Vue({
            el: '#blogposts',
            data: {
                activePost: null,
                posts: {
                    post1: {
                        author: 'Brianna',
                        date: 'February 18, 2021 @ 3:30 pm',
                        text: 'Was amazing! My Walmart didn’t have coriander in stock and didn’t have ground cumin. I used serrano instead of jalapeño. It was just like my favorite tortilla soup from BJs. I am sending this recipe to my family. I want everyone to try it!',
                        profilePic: 'images/profile.png',
                        level: 'Novice',
                        bio: 'Food enthusiast. Love to cook and bake.'
                    },
                    post2: {
                        author: 'LINH',
                        date: 'February 15, 2021 @ 9:46 am',
                        text: 'I just made this soup today and it’s so tasty! didn’t have corn at home but still turned out very good.  It’s a winner!  I made beef chili for my parents; but since my dad has gout he can’t eat beef; this white chicken chili is perfect for him.  Thank you Lisa!',
                        profilePic: 'images/profile.png',
                        level: 'Newcomer',
                        bio: 'Love food! Exploring new recipes every day.'
                    },
                    post3: {
                        author: 'CATHERINE LEONARDO',
                        date: 'February 13, 2021 @ 12:58 pm',
                        text: 'I LOVE this White Chicken Chili! You are right, it is satiating meal—delicious with toasted bread. Refreshingly different taste than any chicken chili I’ve made in the past. I made it exactly as written and added some chopped zucchini, carrots, and celery. Instead of shredding the chicken, I chopped it into small pieces. It freezes very well. Will be an all-time favorite, for sure.',
                        profilePic: 'images/profile.png',
                        level: 'Mentor',
                        bio: 'I have to say I never was the adventurous type until 2 years ago. Now I share my food adventures with everyone!'
                    },
                    post4: {
                        author: 'KALI',
                        date: 'February 13, 2021 @ 11:31 am',
                        text: 'This recipe is dynamite! My partner usually won’t eat beans but he finished the whole pot (darn was hoping to have some for leftovers haha). This is crowd-pleaser that I am going to add to my regular recipe rotation. Thanks so much, Lisa!',
                        profilePic: 'images/profile.png',
                        level: 'Novice',
                        bio: 'Food is my passion. So is cooking.'
                    }
                }
            },
            methods: {
                displayProfile: function(post) {
                    this.activePost = post;
                }
            }
        });
    </script>
</body>
</html>
